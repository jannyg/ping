name: Deploy to TestFlight

# Runs automatically on push to main, or manually from Actions tab.
#
# Required GitHub Secrets:
#   DISTRIBUTION_CERTIFICATE_P12      - Base64-encoded .p12 distribution certificate
#                                       Generate: base64 -i cert.p12 | pbcopy
#   DISTRIBUTION_CERTIFICATE_PASSWORD - Password for the .p12 file
#   PROVISIONING_PROFILE              - Base64-encoded Mac App Store .provisionprofile
#                                       Generate: base64 -i profile.provisionprofile | pbcopy
#   KEYCHAIN_PASSWORD                 - Any random password (used for the temporary keychain)
#   APP_STORE_CONNECT_API_KEY_ID      - Key ID from App Store Connect (e.g. ABC123DEF4)
#   APP_STORE_CONNECT_API_KEY_ISSUER  - Issuer ID (UUID) from App Store Connect
#   APP_STORE_CONNECT_API_KEY         - Contents of the .p8 private key file

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ── Code signing setup ──────────────────────────────────────────────────

      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Import distribution certificate
        run: |
          python3 -c "import base64,os; open('certificate.p12','wb').write(base64.b64decode(os.environ['DISTRIBUTION_CERTIFICATE_P12']))"
          security import certificate.p12 \
            -k build.keychain \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          python3 -c "import base64,os; data=os.environ.get('PROVISIONING_PROFILE',''); print('Secret length:',len(data)); decoded=base64.b64decode(data); print('Decoded bytes:',len(decoded)); open('/tmp/PingMonitor.provisionprofile','wb').write(decoded)"
          openssl smime -inform der -verify -noverify \
            -in /tmp/PingMonitor.provisionprofile \
            -out /tmp/profile.plist 2>/dev/null
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)
          echo "Profile name: $PROFILE_NAME"
          echo "Profile UUID: $UUID"
          cp /tmp/PingMonitor.provisionprofile \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.provisionprofile
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}

      # ── App Store Connect API key ────────────────────────────────────────────

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      # ── Build & archive ──────────────────────────────────────────────────────

      - name: Archive
        run: |
          xcodebuild clean archive \
            -project PingMonitor.xcodeproj \
            -scheme PingMonitor \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$PWD/build/PingMonitor.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" \
            DEVELOPMENT_TEAM=LCSMC3CU5X

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/PingMonitor.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist ".github/ExportOptions.plist" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -allowProvisioningUpdates
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}

      # ── Upload to TestFlight ─────────────────────────────────────────────────

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file "$(find $PWD/build/export -name '*.pkg' | head -1)" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER"
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}

      # ── Cleanup ──────────────────────────────────────────────────────────────

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain || true
